<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B1F2A">
<title>Pronostics Mondial 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ===== ÉCRAN DE CHARGEMENT ===== -->
  <div id="screen-loading" class="screen active">
    <div class="kickoff-loader">
      <div class="ball"></div>
      <p>Chargement du tableau d'affichage…</p>
    </div>
  </div>

  <!-- ===== ÉCRAN CONNEXION / INSCRIPTION ===== -->
  <div id="screen-auth" class="screen">
    <header class="auth-hero">
      <span class="eyebrow">Coupe du Monde · 2026</span>
      <h1>Pronostics<br>du groupe</h1>
      <p class="tagline">Un ticket par match. Une fois validé, il est définitif.</p>
    </header>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Se connecter</button>
        <button class="tab" data-tab="signup">S'inscrire</button>
      </div>

      <form id="form-login" class="auth-form active">
        <label for="login-username">Identifiant</label>
        <input type="text" id="login-username" autocomplete="username" required>

        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" autocomplete="current-password" required>

        <p class="form-error" id="login-error"></p>
        <button type="submit" class="btn-primary">Entrer sur le terrain</button>
      </form>

      <form id="form-signup" class="auth-form">
        <label for="signup-displayname">Nom affiché</label>
        <input type="text" id="signup-displayname" placeholder="Ex. Abdel" required>

        <label for="signup-username">Identifiant</label>
        <input type="text" id="signup-username" placeholder="Sans espace, unique" autocomplete="username" required>

        <label for="signup-password">Mot de passe</label>
        <input type="password" id="signup-password" autocomplete="new-password" required minlength="6">

        <label for="signup-password2">Confirmer le mot de passe</label>
        <input type="password" id="signup-password2" autocomplete="new-password" required minlength="6">

        <p class="form-error" id="signup-error"></p>
        <button type="submit" class="btn-primary">Créer mon compte</button>
      </form>
    </div>
  </div>

  <!-- ===== ÉCRAN PRINCIPAL (APRÈS CONNEXION) ===== -->
  <div id="screen-main" class="screen">
    <header class="main-header">
      <div class="header-top">
        <div>
          <span class="eyebrow">Bienvenue</span>
          <h2 id="welcome-name">—</h2>
        </div>
        <button id="btn-logout" class="btn-ghost">Quitter</button>
      </div>
      <nav class="subnav">
        <button class="subnav-btn active" data-view="matches">Matchs</button>
        <button class="subnav-btn" data-view="mybets">Mes tickets</button>
        <button class="subnav-btn" data-view="ranking">Classement</button>
      </nav>
    </header>

    <main id="view-matches" class="view active">
      <div id="matches-list" class="matches-list">
        <!-- injecté en JS -->
      </div>
    </main>

    <main id="view-mybets" class="view">
      <div id="mybets-list" class="matches-list">
        <!-- injecté en JS -->
      </div>
    </main>

    <main id="view-ranking" class="view">
      <div class="ranking-banner">
        <span class="eyebrow">Tableau d'affichage final</span>
        <h2>Classement</h2>
      </div>
      <ol id="ranking-list" class="ranking-list">
        <!-- injecté en JS -->
      </ol>
    </main>
  </div>

</div>

<!-- Onglets Se connecter / S'inscrire : activés immédiatement, -->
<!-- indépendamment de Firebase, pour que l'interface réagisse -->
<!-- même si la configuration Firebase n'est pas encore prête. -->
<script>
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".auth-form").forEach(f => f.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("form-" + tab.dataset.tab).classList.add("active");
  });
});
</script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="matches-data.js"></script>
<script src="app.js"></script>
</body>
</html>
